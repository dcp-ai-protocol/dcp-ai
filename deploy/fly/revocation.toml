# Fly.io deployment for the DCP-AI revocation registry.
# Accepts revocation records from operators and serves them at
# /.well-known/dcp-revocations.json for verifiers to consult.
#
# Usage:
#   fly launch --config revocation.toml --no-deploy
#   fly deploy --config revocation.toml

app = "dcp-ai-revocation"
primary_region = "iad"

[build]
  image = "ghcr.io/dcp-ai-protocol/dcp-ai/revocation:latest"

[env]
  PORT = "3003"
  DCP_VERSION = "2.0"

[http_service]
  internal_port = 3003
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
