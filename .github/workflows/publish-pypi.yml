name: Publish dcp-ai to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

# Default: read-only. The publish job overrides with `id-token: write`
# for PyPI Trusted Publishing (OIDC).
permissions:
  contents: read

jobs:
  publish-python-sdk:
    name: Publish dcp-ai to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcp-ai
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check if version already published
        id: check
        working-directory: sdks/python
        run: |
          LOCAL=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if curl -sf "https://pypi.org/pypi/dcp-ai/$LOCAL/json" > /dev/null; then
            echo "dcp-ai $LOCAL is already on PyPI — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip != 'true'
        name: Build sdist and wheel
        working-directory: sdks/python
        run: |
          pip install build
          python -m build
      - if: steps.check.outputs.skip != 'true'
        name: Publish via PyPI Trusted Publishing (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
