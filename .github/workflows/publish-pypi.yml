name: Publish dcp-ai to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-python-sdk:
    name: Publish dcp-ai to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcp-ai
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        working-directory: sdks/python
        run: |
          pip install build
          python -m build
      - name: Publish via PyPI Trusted Publishing (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
