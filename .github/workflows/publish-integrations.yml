  publish-express:
    name: Publish @dcp-ai/express
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'express'
    defaults:
      run:
        working-directory: integrations/express
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/express@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
            echo "@dcp-ai/express@$LOCAL is already on npm — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip != 'true'
        name: Install against the published @dcp-ai/sdk
        run: npm install --no-package-lock
      - if: steps.check.outputs.skip != 'true'
        run: npm run build
      - if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-openclaw:
