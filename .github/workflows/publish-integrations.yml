  publish-w3c-did:
    name: Publish @dcp-ai/w3c-did
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'w3c-did'
    defaults:
