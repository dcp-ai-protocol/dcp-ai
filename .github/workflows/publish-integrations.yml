        working-directory: integrations/w3c-did
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/w3c-did@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
            echo "@dcp-ai/w3c-did@$LOCAL is already on npm — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
