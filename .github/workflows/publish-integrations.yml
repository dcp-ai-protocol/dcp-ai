name: Publish Integrations

# Publishes the 6 framework integrations to npm. Each is its own
# package under the @dcp-ai scope and is independent of the others.
# Every job pre-checks whether the manifest version is already on npm
# and, if so, exits green with a skip notice. That keeps the Actions
# tab free of red ghosts when a release only bumps one integration.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Integration to publish'
        required: true
        type: choice
        options:
          - all
          - anthropic-mcp
          - autogen
          - google-a2a
          - w3c-did
          - express
          - openclaw

jobs:
  publish-anthropic-mcp:
    name: Publish @dcp-ai/anthropic-mcp
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'anthropic-mcp'
    defaults:
      run:
        working-directory: integrations/anthropic-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/anthropic-mcp@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
            echo "@dcp-ai/anthropic-mcp@$LOCAL is already on npm — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-autogen:
    name: Publish @dcp-ai/autogen
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'autogen'
    defaults:
      run:
        working-directory: integrations/autogen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/autogen@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
            echo "@dcp-ai/autogen@$LOCAL is already on npm — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-google-a2a:
    name: Publish @dcp-ai/google-a2a
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'google-a2a'
    defaults:
      run:
        working-directory: integrations/google-a2a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/google-a2a@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
