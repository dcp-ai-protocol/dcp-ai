name: Publish Packages

# Publishes the core SDK packages (TypeScript, WASM, CLI, Rust).
# Every job pre-checks whether the manifest version is already on the
# registry; if it is, the job prints a skip notice and exits green.
# That way releases that only bump one package (e.g. the Python SDK
# at v2.0.1) don't leave red ghosts in the Actions tab.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - all
          - sdk-typescript
          - sdk-wasm
          - cli
          - sdk-rust

jobs:
  publish-typescript-sdk:
    name: Publish @dcp-ai/sdk to NPM
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'sdk-typescript'
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/sdk@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
            echo "@dcp-ai/sdk@$LOCAL is already on npm — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip != 'true'
        run: npm ci
      - if: steps.check.outputs.skip != 'true'
        run: npm run lint
      - if: steps.check.outputs.skip != 'true'
        run: npm run test
      - if: steps.check.outputs.skip != 'true'
        run: npm run build
      - if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-wasm-sdk:
    name: Publish @dcp-ai/wasm to NPM
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'sdk-wasm'
    defaults:
      run:
        working-directory: sdks/wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/wasm@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
            echo "@dcp-ai/wasm@$LOCAL is already on npm — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.check.outputs.skip != 'true'
        name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - if: steps.check.outputs.skip != 'true'
        run: npm install
      - if: steps.check.outputs.skip != 'true'
        run: npm run build
      - if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    name: Publish @dcp-ai/cli to NPM
    runs-on: ubuntu-latest
    needs: publish-typescript-sdk
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'cli'
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @dcp-ai/cli@$LOCAL version 2>/dev/null || true)
          if [ -n "$REMOTE" ]; then
            echo "@dcp-ai/cli@$LOCAL is already on npm — skipping publish."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.skip != 'true'
        name: Install against the freshly-published SDK
        run: npm install --no-package-lock
      - if: steps.check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-rust-sdk:
    name: Publish dcp-ai to crates.io
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'sdk-rust'
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check if version already published
        id: check
        run: |
          LOCAL=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          # HEAD the static tarball URL; 200 = exists, 403/404 = does not.
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -I "https://static.crates.io/crates/dcp-ai/dcp-ai-$LOCAL.crate")
          echo "HEAD dcp-ai-$LOCAL.crate -> $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "dcp-ai@$LOCAL is already on crates.io — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.skip != 'true'
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
