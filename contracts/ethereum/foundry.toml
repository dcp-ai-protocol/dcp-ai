[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
# Read from environment (fall back to public RPCs).
# Use `foundry-toml` env interpolation: ${VAR}.
sepolia         = "${SEPOLIA_RPC_URL}"
base            = "${BASE_RPC_URL}"
base_sepolia    = "${BASE_SEPOLIA_RPC_URL}"
optimism        = "${OPTIMISM_RPC_URL}"
arbitrum        = "${ARBITRUM_RPC_URL}"

[etherscan]
# API keys come from env too. Basescan uses a Base-specific key;
# Etherscan v2 multi-chain key also works via the `etherscan` key.
sepolia         = { key = "${ETHERSCAN_API_KEY}" }
base            = { key = "${BASESCAN_API_KEY}" }
base_sepolia    = { key = "${BASESCAN_API_KEY}" }
optimism        = { key = "${OPTIMISTIC_ETHERSCAN_API_KEY}" }
arbitrum        = { key = "${ARBISCAN_API_KEY}" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
