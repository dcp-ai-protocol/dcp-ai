# DCP-AI v2.0 Full Stack — docker compose up
#
# Services:
#   - verification:     V1/V2 bundle verification, passport register,
#                       intent declare, audit, key rotation, emergency revoke,
#                       multi-party auth, algorithm advisories, audit compaction
#                       (port 3000)
#   - anchor:           Blockchain anchoring service (port 3001)
#   - transparency-log: Merkle transparency log (port 3002)
#   - revocation:       Key/agent revocation service (port 3003)
#
# V2 Endpoints on verification service:
#   POST /v2/passport/register          — Register agent passport + keys
#   POST /v2/intent/declare             — Declare intent, get policy decision
#   POST /v2/audit/append               — Append audit event
#   POST /v2/audit/compact              — Audit trail compaction
#   POST /v2/bundle/verify              — Full V2 composite verification
#   GET  /v2/keys/:kid                  — Key registry lookup
#   POST /v2/keys/rotate                — Key rotation with PoP
#   POST /v2/emergency-revoke           — Panic button revocation
#   POST /v2/multi-party/authorize      — Multi-party M-of-N auth
#   POST /v2/advisory/publish           — Publish algorithm advisory
#   GET  /v2/advisory/check             — Check active advisories
#   GET  /.well-known/dcp-capabilities.json
#   GET  /.well-known/algorithm-advisories.json

version: "3.9"

services:
  verification:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: verification
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DCP_VERSION=2.0
      - VERIFIER_MODE=hybrid_required
      - REQUIRE_SESSION_BINDING=true
      - REQUIRE_COMPOSITE_BINDING=true
      - MAX_KEY_AGE_DAYS=365
      - ALLOW_V1_BUNDLES=true
      - PQ_CHECKPOINT_INTERVAL=10
      - ADVISORY_POLL_INTERVAL_MS=86400000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  anchor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: anchor
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DCP_VERSION=2.0
      - ANCHOR_MODE=batch
      - BATCH_INTERVAL_MS=60000
      # Configure for production:
      # - ANCHOR_RPC_URL=https://mainnet.base.org
      # - ANCHOR_PRIVATE_KEY=0x...
      # - ANCHOR_CONTRACT=0x...
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  transparency-log:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: transparency-log
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DCP_VERSION=2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  revocation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: revocation
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DCP_VERSION=2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
