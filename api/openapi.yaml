openapi: "3.1.0"
info:
  title: DCP Verification API
  description: |
    HTTP API for the Digital Citizenship Protocol (DCP) for AI Agents.
    Provides endpoints for verifying signed bundles (V1 and V2), anchoring hashes,
    checking revocations, querying the transparency log, managing agent keys,
    and governance operations.

    ## Service Routing

    DCP runs as a set of microservices, each on its own port.
    The paths in this specification use canonical prefixes suitable for a
    unified gateway (e.g. `https://api.dcp-ai.org`). When accessing individual
    services directly, strip the service prefix:

    | Canonical path prefix  | Direct service (port) | Strip prefix |
    |------------------------|-----------------------|--------------|
    | `/transparency-log/*`  | `:3002`               | `/add`, `/root`, `/proof/{index}`, … |
    | `/revocations*`        | `:3003`               | `/list` (GET), `/revoke` (POST), `/check/{agent_id}` (GET) |
    | `/anchor`              | `:3001`               | `/anchor` |
    | Everything else        | `:3000` (gateway)     | No change |
  version: "2.0.0"
  contact:
    name: DCP-AI
    url: https://dcp-ai.org
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:3000
    description: Local development server (gateway) — NOT for production
  - url: http://localhost:3001
    description: Local anchor service — NOT for production
  - url: http://localhost:3002
    description: Local transparency-log service — NOT for production
  - url: http://localhost:3003
    description: Local revocation service — NOT for production
  - url: https://api.dcp-ai.org
    description: Production server (TLS 1.3 required)

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Health
    description: Service health checks
  - name: Discovery
    description: Capability and configuration discovery
  - name: Verification
    description: Verify DCP signed bundles (V1 and V2)
  - name: Anchoring
    description: Anchor bundle hashes to blockchain
  - name: Revocation
    description: Check and publish agent revocations
  - name: Transparency
    description: Append-only transparency log
  - name: Passport
    description: V2 agent passport registration
  - name: Intent
    description: V2 intent declaration and policy
  - name: Audit
    description: V2 audit chain management
  - name: Keys
    description: V2 key registry and rotation
  - name: Emergency
    description: V2 emergency revocation
  - name: MultiParty
    description: V2 multi-party authorization
  - name: Advisory
    description: Algorithm advisories and crypto-agility
  - name: Policy
    description: Verifier policy management (Phase 3)
  - name: Governance
    description: Governance key management (Phase 3)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  supported_versions:
                    type: array
                    items:
                      type: string
              example:
                ok: true
                service: dcp-verification
                supported_versions: ["1.0", "2.0"]

  /.well-known/dcp-capabilities.json:
    get:
      tags: [Discovery]
      summary: Capability discovery
      operationId: getCapabilities
      security: []
      description: Returns supported DCP versions, algorithms, wire formats, and feature flags.
      responses:
        "200":
          description: DCP capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DcpCapabilities"

  /.well-known/algorithm-advisories.json:
    get:
      tags: [Advisory]
      summary: List algorithm advisories
      operationId: getAlgorithmAdvisories
      security: []
      responses:
        "200":
          description: Published algorithm advisories
          content:
            application/json:
              schema:
                type: object
                properties:
                  advisories:
                    type: array
                    items:
                      $ref: "#/components/schemas/AlgorithmAdvisory"

  /.well-known/governance-keys.json:
    get:
      tags: [Governance]
      summary: Published governance keys
      operationId: getGovernanceKeys
      security: []
      responses:
        "200":
          description: Governance key set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceKeySet"
        "404":
          description: No governance key set registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /verify:
    post:
      tags: [Verification]
      summary: Verify a signed bundle (V1 or V2 auto-detect)
      operationId: verifyBundle
      x-ratelimit:
        rate: 100/minute
        burst: 20
        by: ip
      description: |
        Performs full DCP verification with automatic version detection:

        V1: Schema validation, Ed25519 signature, bundle hash integrity,
        Merkle root, intent hash chain, and previous hash chain verification.

        V2: Composite signature structure, session nonce consistency,
        manifest integrity, tier-aware policy enforcement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signed_bundle]
              properties:
                signed_bundle:
                  oneOf:
                    - $ref: "#/components/schemas/SignedBundleV1"
                    - $ref: "#/components/schemas/SignedBundleV2"
                public_key_b64:
                  type: string
                  description: Optional Ed25519 public key (base64) for V1. Falls back to signer.public_key_b64.
            example:
              signed_bundle:
                bundle:
                  dcp_bundle_version: "2.0"
                  manifest:
                    session_nonce: "a1b2c3..."
                    rpr_hash: "sha256:..."
                    passport_hash: "sha256:..."
                    intent_hash: "sha256:..."
                    policy_hash: "sha256:..."
                    audit_merkle_root: "sha256:..."
                    audit_count: 1
                  responsible_principal_record:
                    payload: {}
                    composite_sig: {}
                  agent_passport:
                    payload: {}
                    composite_sig: {}
                  intent:
                    payload: {}
                    composite_sig: {}
                  policy_decision:
                    payload: {}
                    composite_sig: {}
                  audit_entries: []
                signature:
                  composite_sig:
                    classical: { alg: ed25519, kid: "abc123", sig_b64: "..." }
                    pq: { alg: ml-dsa-65, kid: "def456", sig_b64: "..." }
                    binding: pq_over_classical
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
              example:
                verified: true
                dcp_version: "2.0"
                errors: []
                warnings: []
                verifier_policy_hash: "sha256:abc123..."
                resolved_tier: standard
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /anchor:
    post:
      tags: [Anchoring]
      summary: Anchor a bundle hash to blockchain
      operationId: anchorHash
      x-ratelimit:
        rate: 30/minute
        burst: 5
        by: api_key
      description: |
        Anchors a bundle hash (or batch of hashes) to an L2 blockchain.
        Returns 501 on the reference gateway; use the anchor service (port 3001) directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bundle_hash]
              properties:
                bundle_hash:
                  type: string
                  pattern: "^sha256:[0-9a-f]{64}$"
                chain:
                  type: string
                  enum: [base, arbitrum, optimism]
                  default: base
            example:
              bundle_hash: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
              chain: base
      responses:
        "200":
          description: Anchor receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnchorReceipt"
        "501":
          description: Anchoring not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /revocations:
    get:
      tags: [Revocation]
      summary: List all revocations
      operationId: listRevocations
      description: Available on the revocation service (port 3003).
      responses:
        "200":
          description: List of revocation records
          content:
            application/json:
              schema:
                type: object
                properties:
                  revocations:
                    type: array
                    items:
                      $ref: "#/components/schemas/RevocationRecord"

    post:
      tags: [Revocation]
      summary: Publish a revocation
      operationId: publishRevocation
      x-ratelimit:
        rate: 10/minute
        burst: 3
        by: api_key
      description: Available on the revocation service (port 3003).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevocationRecord"
      responses:
        "201":
          description: Revocation published
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agent_id:
                    type: string

  /revocations/{agent_id}:
    get:
      tags: [Revocation]
      summary: Check revocation status of an agent
      operationId: checkRevocation
      description: Available on the revocation service (port 3003).
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revocation status
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
                  record:
                    $ref: "#/components/schemas/RevocationRecord"

  /transparency-log/add:
    post:
      tags: [Transparency]
      summary: Add entry to transparency log
      operationId: addToLog
      x-ratelimit:
        rate: 60/minute
        burst: 10
        by: api_key
      description: Available on the transparency-log service (port 3002).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bundle_hash]
              properties:
                bundle_hash:
                  type: string
      responses:
        "200":
          description: Log entry added
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    type: integer
                  leaf_hash:
                    type: string
                  root:
                    type: string
                  size:
                    type: integer

  /transparency-log/root:
    get:
      tags: [Transparency]
      summary: Get current log root
      operationId: getLogRoot
      description: Available on the transparency-log service (port 3002).
      responses:
        "200":
          description: Current Merkle root of the transparency log
          content:
            application/json:
              schema:
                type: object
                properties:
                  root:
                    type: string
                  size:
                    type: integer

  /transparency-log/proof/{index}:
    get:
      tags: [Transparency]
      summary: Get Merkle inclusion proof
      operationId: getLogProof
      description: Available on the transparency-log service (port 3002).
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Merkle inclusion proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InclusionProof"

  /transparency-log/root/signed:
    get:
      tags: [Transparency]
      summary: Get signed tree head (STH)
      operationId: getSignedTreeHead
      description: |
        Returns a Signed Tree Head — the current Merkle root signed by the log operator.
        Used for gossip protocol cross-log verification.
      responses:
        "200":
          description: Signed tree head
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedTreeHead"

  /transparency-log/gossip/peers:
    get:
      tags: [Transparency]
      summary: List gossip peers
      operationId: getGossipPeers
      description: List all known gossip peers and recent split-view alerts.
      responses:
        "200":
          description: Gossip peers and alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  log_id:
                    type: string
                  peers:
                    type: array
                    items:
                      type: object
                      properties:
                        peer_id:
                          type: string
                        endpoint:
                          type: string
                        last_seen:
                          type: string
                          format: date-time
                          nullable: true
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/SplitViewAlert"
    post:
      tags: [Transparency]
      summary: Add a gossip peer
      operationId: addGossipPeer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer_id, endpoint]
              properties:
                peer_id:
                  type: string
                endpoint:
                  type: string
                  format: uri
      responses:
        "200":
          description: Peer added
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: string
                  peers:
                    type: integer

  /transparency-log/gossip/exchange:
    post:
      tags: [Transparency]
      summary: Gossip STH exchange
      operationId: gossipExchange
      description: |
        Exchange signed tree heads between log instances for cross-verification.
        Detects split-view attacks when roots differ for the same tree size.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sth:
                  $ref: "#/components/schemas/SignedTreeHead"
      responses:
        "200":
          description: Local STH and any detected alert
          content:
            application/json:
              schema:
                type: object
                properties:
                  sth:
                    $ref: "#/components/schemas/SignedTreeHead"
                  alert:
                    $ref: "#/components/schemas/SplitViewAlert"
                    nullable: true

  /transparency-log/gossip/alerts:
    get:
      tags: [Transparency]
      summary: Get split-view security alerts
      operationId: getGossipAlerts
      responses:
        "200":
          description: List of detected split-view alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/SplitViewAlert"
                  count:
                    type: integer

  /v2/passport/register:
    post:
      tags: [Passport]
      summary: Register agent passport and keys
      operationId: registerPassport
      description: |
        Registers a V2 agent passport with composite-signed keys.
        Verifies deterministic kid derivation and stores keys in the registry.
        Optionally registers an emergency revocation token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signed_passport]
              properties:
                signed_passport:
                  $ref: "#/components/schemas/SignedPayload"
            example:
              signed_passport:
                payload:
                  dcp_version: "2.0"
                  agent_id: "agent-001"
                  session_nonce: "a1b2c3d4..."
                  keys:
                    - kid: "abc123..."
                      alg: ed25519
                      public_key_b64: "..."
                      created_at: "2026-03-01T00:00:00Z"
                      status: active
                  emergency_revocation_token: "sha256:..."
                composite_sig:
                  classical: { alg: ed25519, kid: "abc123", sig_b64: "..." }
                  binding: classical_only
      responses:
        "201":
          description: Passport registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agent_id:
                    type: string
                  registered_kids:
                    type: array
                    items:
                      type: string
              example:
                ok: true
                agent_id: agent-001
                registered_kids: ["abc123..."]
        "400":
          description: Invalid passport data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/intent/declare:
    post:
      tags: [Intent]
      summary: Declare intent and get policy decision
      operationId: declareIntent
      description: |
        Submits a signed intent declaration. The server computes a risk score,
        security tier, and policy decision (approve/escalate/block).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signed_intent]
              properties:
                signed_intent:
                  $ref: "#/components/schemas/SignedPayload"
            example:
              signed_intent:
                payload:
                  dcp_version: "2.0"
                  intent_id: "intent-001"
                  agent_id: "agent-001"
                  session_nonce: "a1b2c3d4..."
                  action_type: api_call
                  estimated_impact: low
                  data_classes: []
                composite_sig:
                  classical: { alg: ed25519, kid: "abc123", sig_b64: "..." }
                  binding: classical_only
      responses:
        "200":
          description: Policy decision
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  policy_decision:
                    $ref: "#/components/schemas/PolicyDecisionV2"
                  security_tier:
                    type: string
                    enum: [routine, standard, elevated, maximum]
                  verification_mode:
                    type: string
                    enum: [classical_only, hybrid_preferred, hybrid_required, pq_only]
                  checkpoint_interval:
                    type: integer
              example:
                ok: true
                policy_decision:
                  dcp_version: "2.0"
                  intent_id: intent-001
                  decision: approve
                  risk_score: 200
                  reasons: ["Risk score within acceptable range."]
                security_tier: standard
                verification_mode: hybrid_preferred
                checkpoint_interval: 10
        "400":
          description: Invalid intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Agent revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/audit/append:
    post:
      tags: [Audit]
      summary: Append audit event to chain
      operationId: appendAudit
      description: Appends a signed audit event to the agent's audit chain, verifying prev_hash continuity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audit_event]
              properties:
                audit_event:
                  type: object
                  additionalProperties: false
                  maxProperties: 50
                signature:
                  type: object
                  additionalProperties: false
      responses:
        "201":
          description: Audit event appended
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  audit_id:
                    type: string
                  chain_length:
                    type: integer
        "400":
          description: Invalid audit event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/audit/compact:
    post:
      tags: [Audit]
      summary: Compact audit trail
      operationId: compactAudit
      description: Submits an audit compaction with a Merkle root covering a range of events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compaction]
              properties:
                compaction:
                  type: object
                  required: [type, range, merkle_root, composite_sig, session_nonce]
                  properties:
                    type:
                      type: string
                      enum: [audit_compaction]
                    session_nonce:
                      type: string
                    range:
                      type: object
                    merkle_root:
                      type: string
                    composite_sig:
                      $ref: "#/components/schemas/CompositeSignature"
      responses:
        "201":
          description: Compaction accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  compacted_range:
                    type: object
                  merkle_root:
                    type: string
        "400":
          description: Invalid compaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/bundle/verify:
    post:
      tags: [Verification]
      summary: Full V2 bundle verification (tier-aware)
      operationId: verifyBundleV2
      description: |
        Performs tier-aware V2 bundle verification including composite signature
        validation, session binding, manifest integrity, and security tier enforcement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signed_bundle:
                  $ref: "#/components/schemas/SignedBundleV2"
      responses:
        "200":
          description: V2 verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  dcp_version:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
                  verifier_policy_hash:
                    type: string
                  resolved_tier:
                    type: [string, "null"]
                    enum: [routine, standard, elevated, maximum, null]
                  verification_mode:
                    type: string
                  session_binding_valid:
                    type: boolean
                  manifest_valid:
                    type: boolean
        "400":
          description: Invalid bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/keys/{kid}:
    get:
      tags: [Keys]
      summary: Key registry lookup
      operationId: lookupKey
      parameters:
        - name: kid
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-f]+$"
      responses:
        "200":
          description: Key found
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  kid:
                    type: string
                  key:
                    $ref: "#/components/schemas/KeyEntryV2"
                  agent_id:
                    type: string
                  revoked:
                    type: boolean
                  expired:
                    type: boolean
        "404":
          description: Key not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  kid:
                    type: string

  /v2/keys/rotate:
    post:
      tags: [Keys]
      summary: Key rotation with proof of possession
      operationId: rotateKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_kid, new_key, proof_of_possession]
              properties:
                old_kid:
                  type: string
                new_key:
                  $ref: "#/components/schemas/KeyEntryV2"
                proof_of_possession:
                  type: object
                authorization_sig:
                  type: object
      responses:
        "200":
          description: Key rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  old_kid:
                    type: string
                  new_kid:
                    type: string
                  agent_id:
                    type: string
                  rotated_at:
                    type: string
                    format: date-time
        "400":
          description: Invalid rotation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Old key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/emergency-revoke:
    post:
      tags: [Emergency]
      summary: Emergency revocation (panic button)
      operationId: emergencyRevoke
      description: |
        Revokes all keys for an agent using a pre-registered emergency revocation
        secret. Rate-limited to 5 requests per minute per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, revocation_secret]
              properties:
                agent_id:
                  type: string
                human_id:
                  type: string
                revocation_secret:
                  type: string
                  pattern: "^[0-9a-f]{64}$"
            example:
              agent_id: agent-001
              revocation_secret: "a1b2c3d4e5f6..."
      responses:
        "200":
          description: Agent revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agent_id:
                    type: string
                  revoked_at:
                    type: string
                    format: date-time
                  keys_revoked:
                    type: integer
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid revocation secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No emergency token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/multi-party/authorize:
    post:
      tags: [MultiParty]
      summary: Multi-party M-of-N authorization
      operationId: multiPartyAuthorize
      description: |
        Validates a multi-party authorization request. Requires at least the
        threshold number of authorizations including an owner signature.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [authorization]
              properties:
                authorization:
                  type: object
                  required: [type, operation, authorizations]
                  properties:
                    type:
                      type: string
                      enum: [multi_party_authorization]
                    operation:
                      type: string
                      enum: [revoke_agent, rotate_org_key, change_jurisdiction, modify_recovery_config]
                    required_parties:
                      type: integer
                      default: 2
                    authorizations:
                      type: array
                      maxItems: 20
                      items:
                        type: object
                        properties:
                          party_id:
                            type: string
                            maxLength: 256
                          role:
                            type: string
                            maxLength: 64
                          composite_sig:
                            $ref: "#/components/schemas/CompositeSignature"
      responses:
        "200":
          description: Authorization verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  operation:
                    type: string
                  parties_verified:
                    type: integer
                  threshold_met:
                    type: boolean
        "400":
          description: Invalid authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient authorizations or missing owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/advisory/publish:
    post:
      tags: [Advisory]
      summary: Publish algorithm advisory
      operationId: publishAdvisory
      x-ratelimit:
        rate: 5/minute
        burst: 1
        by: api_key
      description: Publishes a governance-signed algorithm advisory (deprecate/warn/revoke).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [advisory]
              properties:
                advisory:
                  $ref: "#/components/schemas/AlgorithmAdvisory"
      responses:
        "201":
          description: Advisory published
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  advisory_id:
                    type: string
                  affected_algorithms:
                    type: array
                    items:
                      type: string
                  action:
                    type: string
        "400":
          description: Invalid advisory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/advisory/check:
    get:
      tags: [Advisory]
      summary: Check active advisories
      operationId: checkAdvisories
      responses:
        "200":
          description: Active advisory status
          content:
            application/json:
              schema:
                type: object
                properties:
                  deprecated:
                    type: array
                    items:
                      type: string
                  warned:
                    type: array
                    items:
                      type: string
                  revoked:
                    type: array
                    items:
                      type: string
                  active_advisories:
                    type: array
                    items:
                      type: object
                      properties:
                        advisory_id:
                          type: string
                        severity:
                          type: string
                        action:
                          type: string
                        affected_algorithms:
                          type: array
                          items:
                            type: string
                        grace_period_expired:
                          type: boolean

  /v2/advisory/auto-apply:
    post:
      tags: [Advisory]
      summary: Auto-apply advisories to verifier policy
      operationId: autoApplyAdvisories
      x-ratelimit:
        rate: 5/minute
        burst: 1
        by: api_key
      description: |
        Scans active advisories and automatically updates the verifier policy
        by removing deprecated/revoked algorithms and adding replacements.
        May auto-switch to pq_only mode if all classical algorithms are removed.
      responses:
        "200":
          description: Advisory auto-apply result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  policy_modified:
                    type: boolean
                  removed_classical:
                    type: array
                    items:
                      type: string
                  removed_pq:
                    type: array
                    items:
                      type: string
                  added_replacements:
                    type: array
                    items:
                      type: string
                  advisory_rejected_algs:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
                  current_mode:
                    type: string
                  policy_hash:
                    type: string

  /v2/policy:
    get:
      tags: [Policy]
      summary: Get current verifier policy
      operationId: getPolicy
      responses:
        "200":
          description: Current verifier policy
          content:
            application/json:
              schema:
                type: object
                properties:
                  policy:
                    $ref: "#/components/schemas/VerifierPolicy"
                  policy_hash:
                    type: string
                  mode:
                    type: string
                  advisory_rejected_algs:
                    type: array
                    items:
                      type: string
                  policy_history_length:
                    type: integer

  /v2/policy/mode:
    post:
      tags: [Policy]
      summary: Switch verifier mode
      operationId: switchPolicyMode
      x-ratelimit:
        rate: 5/minute
        burst: 2
        by: api_key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [classical_only, pq_only, hybrid_required, hybrid_preferred]
            example:
              mode: hybrid_required
      responses:
        "200":
          description: Mode switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  previous_mode:
                    type: string
                  current_mode:
                    type: string
                  policy_hash:
                    type: string
        "400":
          description: Invalid mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v2/governance/register:
    post:
      tags: [Governance]
      summary: Register governance key set
      operationId: registerGovernance
      x-ratelimit:
        rate: 5/minute
        burst: 1
        by: api_key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [governance_key_set]
              properties:
                governance_key_set:
                  $ref: "#/components/schemas/GovernanceKeySet"
      responses:
        "201":
          description: Governance key set registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  governance_id:
                    type: string
                  threshold:
                    type: integer
                  key_count:
                    type: integer
                  registered_at:
                    type: string
                    format: date-time
        "400":
          description: Invalid governance key set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token for authenticated API access.
        Required for all mutating operations.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-DCP-API-Key
      description: |
        API key for service-to-service authentication.
        Issued by the DCP operator.
  schemas:
    SignedBundleV1:
      type: object
      required: [bundle, signature]
      properties:
        bundle:
          $ref: "#/components/schemas/CitizenshipBundleV1"
        signature:
          type: object
          required: [alg, created_at, signer, bundle_hash, sig_b64]
          properties:
            alg:
              type: string
              enum: [ed25519]
            created_at:
              type: string
              format: date-time
            signer:
              type: object
              properties:
                type:
                  type: string
                  enum: [human, organization]
                id:
                  type: string
                public_key_b64:
                  type: string
            bundle_hash:
              type: string
              pattern: "^sha256:[0-9a-f]{64}$"
            merkle_root:
              type: [string, "null"]
            sig_b64:
              type: string

    CitizenshipBundleV1:
      type: object
      required: [responsible_principal_record, agent_passport, intent, policy_decision, audit_entries]
      properties:
        responsible_principal_record:
          type: object
        agent_passport:
          type: object
        intent:
          type: object
        policy_decision:
          type: object
        audit_entries:
          type: array
          items:
            type: object

    SignedBundleV2:
      type: object
      required: [bundle, signature]
      properties:
        bundle:
          $ref: "#/components/schemas/CitizenshipBundleV2"
        signature:
          type: object
          required: [composite_sig]
          properties:
            hash_alg:
              type: string
              enum: [sha256, sha384]
            created_at:
              type: string
              format: date-time
            signer:
              type: object
              properties:
                type:
                  type: string
                id:
                  type: string
                kids:
                  type: array
                  items:
                    type: string
            manifest_hash:
              type: string
            composite_sig:
              $ref: "#/components/schemas/CompositeSignature"

    CitizenshipBundleV2:
      type: object
      required: [dcp_bundle_version, manifest, responsible_principal_record, agent_passport, intent, policy_decision, audit_entries]
      properties:
        dcp_bundle_version:
          type: string
          enum: ["2.0"]
        manifest:
          $ref: "#/components/schemas/BundleManifest"
        responsible_principal_record:
          $ref: "#/components/schemas/SignedPayload"
        agent_passport:
          $ref: "#/components/schemas/SignedPayload"
        intent:
          $ref: "#/components/schemas/SignedPayload"
        policy_decision:
          $ref: "#/components/schemas/SignedPayload"
        audit_entries:
          type: array
          maxItems: 10000
          items:
            type: object
        pq_checkpoints:
          type: array
          maxItems: 1000
          items:
            type: object

    BundleManifest:
      type: object
      required: [session_nonce, rpr_hash, passport_hash, intent_hash, policy_hash, audit_merkle_root, audit_count]
      properties:
        session_nonce:
          type: string
          pattern: "^[0-9a-f]{64}$"
        rpr_hash:
          type: string
        passport_hash:
          type: string
        intent_hash:
          type: string
        policy_hash:
          type: string
        audit_merkle_root:
          type: string
        audit_merkle_root_secondary:
          type: string
        audit_count:
          type: integer
        pq_checkpoints:
          type: array
          items:
            type: string
        session_expires_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp after which this session/bundle is expired.
        intended_verifier:
          type: string
          maxLength: 256
          description: Audience binding — identifier of the intended verifier to prevent relay attacks.

    SignedPayload:
      type: object
      required: [payload, composite_sig]
      properties:
        payload:
          type: object
        payload_hash:
          type: string
        composite_sig:
          $ref: "#/components/schemas/CompositeSignature"

    CompositeSignature:
      type: object
      properties:
        classical:
          type: object
          properties:
            alg:
              type: string
            kid:
              type: string
            sig_b64:
              type: string
        pq:
          type: object
          properties:
            alg:
              type: string
            kid:
              type: string
            sig_b64:
              type: string
        binding:
          type: string
          enum: [pq_over_classical, classical_only, independent]

    KeyEntryV2:
      type: object
      properties:
        kid:
          type: string
          maxLength: 128
        alg:
          type: string
          enum: [ed25519, ml-dsa-65, slh-dsa-192f]
        public_key_b64:
          type: string
          maxLength: 8192
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, revoked, expired]

    PolicyDecisionV2:
      type: object
      properties:
        dcp_version:
          type: string
        intent_id:
          type: string
        session_nonce:
          type: string
        decision:
          type: string
          enum: [approve, escalate, block]
        risk_score:
          type: integer
          minimum: 0
          maximum: 1000
        reasons:
          type: array
          items:
            type: string
        required_confirmation:
          type: [object, "null"]
        applied_policy_hash:
          type: string
        timestamp:
          type: string
          format: date-time
        resolved_tier:
          type: string
          enum: [routine, standard, elevated, maximum]

    VerificationResult:
      type: object
      properties:
        verified:
          type: boolean
        dcp_version:
          type: string
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        verifier_policy_hash:
          type: string
        resolved_tier:
          type: [string, "null"]

    RevocationRecord:
      type: object
      required: [dcp_version, agent_id, human_id, timestamp, reason, signature]
      properties:
        dcp_version:
          type: string
        agent_id:
          type: string
        human_id:
          type: string
        timestamp:
          type: string
          format: date-time
        reason:
          type: string
        signature:
          type: string

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
          maxLength: 512
        hint:
          type: string
          maxLength: 512
        details:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 512

    AnchorReceipt:
      type: object
      properties:
        anchored:
          type: boolean
        chain:
          type: string
        tx_hash:
          type: string
        bundle_hash:
          type: string
        timestamp:
          type: string
          format: date-time

    InclusionProof:
      type: object
      properties:
        index:
          type: integer
          format: int64
        leaf_hash:
          type: string
        root:
          type: string
        proof:
          type: array
          items:
            type: object
            properties:
              hash:
                type: string
              direction:
                type: string
                enum: [left, right]

    DcpCapabilities:
      type: object
      properties:
        supported_versions:
          type: array
          items:
            type: string
        supported_algs:
          type: object
          properties:
            signing:
              type: array
              items:
                type: string
            kem:
              type: array
              items:
                type: string
            hash:
              type: array
              items:
                type: string
        supported_wire_formats:
          type: array
          items:
            type: string
        features:
          type: object
        verifier_policy_hash:
          type: string
        min_accepted_version:
          type: string

    VerifierPolicy:
      type: object
      properties:
        default_mode:
          type: string
          enum: [classical_only, pq_only, hybrid_required, hybrid_preferred]
        risk_overrides:
          type: object
        min_classical:
          type: integer
        min_pq:
          type: integer
        accepted_classical_algs:
          type: array
          items:
            type: string
        accepted_pq_algs:
          type: array
          items:
            type: string
        accepted_hash_algs:
          type: array
          items:
            type: string
        require_session_binding:
          type: boolean
        require_composite_binding:
          type: boolean
        max_key_age_days:
          type: integer
        allow_v1_bundles:
          type: boolean
        require_session_expiry:
          type: boolean
          description: Whether bundles must include session_expires_at.
        max_session_duration_seconds:
          type: integer
          minimum: 0
          description: Maximum session duration in seconds (0 = no limit).
        require_audience_binding:
          type: boolean
          description: Whether bundles must include intended_verifier matching this verifier.
        verifier_id:
          type: string
          maxLength: 256
          description: This verifier's identity for audience binding checks.

    AlgorithmAdvisory:
      type: object
      required: [type, advisory_id, affected_algorithms, action]
      properties:
        type:
          type: string
          enum: [algorithm_advisory]
        advisory_id:
          type: string
        affected_algorithms:
          type: array
          items:
            type: string
        action:
          type: string
          enum: [deprecate, warn, revoke]
        severity:
          type: string
        effective_date:
          type: string
          format: date-time
        grace_period_days:
          type: integer
        replacement_algorithms:
          type: array
          items:
            type: string
        composite_sig:
          $ref: "#/components/schemas/CompositeSignature"

    GovernanceKeySet:
      type: object
      required: [governance_id, keys, threshold]
      properties:
        governance_id:
          type: string
        keys:
          type: array
          items:
            $ref: "#/components/schemas/KeyEntryV2"
        threshold:
          type: integer
          minimum: 2

    SignedTreeHead:
      type: object
      required: [root, size, timestamp, log_id, signature, public_key]
      properties:
        root:
          type: string
          nullable: true
          description: Hex-encoded SHA-256 Merkle root (null if log is empty).
        size:
          type: integer
          minimum: 0
        timestamp:
          type: string
          format: date-time
        log_id:
          type: string
        signature:
          type: string
          description: HMAC-SHA256 signature over the STH payload, base64-encoded.
        public_key:
          type: string
          description: Hex-encoded SHA-256 hash of the operator key (for verification).

    SplitViewAlert:
      type: object
      required: [type, local_root, peer_root, tree_size, detected_at]
      properties:
        type:
          type: string
          const: split_view_detected
        peer_id:
          type: string
        peer_log_id:
          type: string
        local_root:
          type: string
        peer_root:
          type: string
        tree_size:
          type: integer
        detected_at:
          type: string
          format: date-time
